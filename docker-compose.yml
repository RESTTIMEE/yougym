services:
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: yougym-app
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: mysql://root:rootPass123!@mysql:3306/yougym?charset=utf8mb4
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health',function(r){var d='';r.on('data',function(c){d+=c});r.on('end',function(){try{var j=JSON.parse(d);process.exit(j.code===200?0:1)}catch(e){process.exit(1)}})})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mysql:
    image: mysql:9.0
    container_name: yougym-mysql
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootPass123!
      MYSQL_DATABASE: yougym
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yougym-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
